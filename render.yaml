services:
  - type: web
    name: supply-chain-risk-agent
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: JUA_API_KEY
        sync: false
      - key: CLICKHOUSE_HOST
        sync: false
      - key: CLICKHOUSE_PORT
        sync: false
      - key: CLICKHOUSE_USER
        sync: false
      - key: CLICKHOUSE_PASSWORD
        sync: false
      - key: CLICKHOUSE_DATABASE
        sync: false
      - key: TRUEFOUNDRY_API_KEY
        sync: false
      - key: TRUEFOUNDRY_BASE_URL
        sync: false
      - key: PIONEER_MODEL_NAME
        sync: false
      - key: COMPOSIO_API_KEY
        sync: false
      - key: SLACK_CHANNEL_ID
        sync: false
      - key: DEMO_MODE
        value: "false"
      - key: PORT
        value: "8000"
